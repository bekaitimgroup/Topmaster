<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="am" x1="95" y1="0" x2="161" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4C1D95" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="62" fill="url(#bg)" filter="url(#sh)"/>

  <!-- Subtle top shine -->
  <rect width="256" height="128" rx="62" fill="white" opacity="0.06"/>

  <!-- T crossbar -->
  <rect x="41" y="61" width="174" height="49" rx="24.5" fill="white"/>

  <!-- T stem -->
  <rect x="104" y="85" width="48" height="110" rx="24" fill="white"/>

  <!-- Amber foot (trophy base / master's mark) -->
  <rect x="95" y="169" width="66" height="26" rx="13" fill="url(#am)"/>
</svg>
